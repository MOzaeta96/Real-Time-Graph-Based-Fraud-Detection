global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "inference-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["inference-api:8000"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "drift-detector"
    metrics_path: /metrics
    static_configs:
      - targets: ["drift-detector:8000"]
      
  - job_name: prediction-monitor
    static_configs:
      - targets: ["prediction-monitor:9103"]